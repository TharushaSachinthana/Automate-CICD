name: Industry-Standard CI/CD Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

env:
  APP_VERSION: '1.0' # The user can change this to 1.1, 1.2, etc.
  DOCKER_IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Backend Deps
        run: cd backend && npm install

      - name: Run Backend Tests
        run: cd backend && npm test

      - name: Security Scan (npm audit)
        run: cd backend && npm audit --audit-level=high

  build-and-push:
    name: Build & Push Images
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Image Tag
        id: vars
        run: |
          # Sanitize namespace (remove potential whitespace/newlines)
          NAMESPACE=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | xargs)
          echo "DOCKER_NAMESPACE=$NAMESPACE" >> $GITHUB_ENV
          echo "tag=${{ env.APP_VERSION }}.${{ github.run_number }}" >> $GITHUB_OUTPUT

      # Frontend Build & Push
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_NAMESPACE }}/todo-frontend:${{ steps.vars.outputs.tag }}
            ${{ env.DOCKER_NAMESPACE }}/todo-frontend:latest

      # Backend Build & Push
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_NAMESPACE }}/todo-backend:${{ steps.vars.outputs.tag }}
            ${{ env.DOCKER_NAMESPACE }}/todo-backend:latest

      # Nginx Build & Push
      - name: Build & Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.DOCKER_NAMESPACE }}/todo-nginx:${{ steps.vars.outputs.tag }}
            ${{ env.DOCKER_NAMESPACE }}/todo-nginx:latest
