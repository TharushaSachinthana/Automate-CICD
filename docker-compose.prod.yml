version: '3.8'

services:
  nginx-proxy:
    image: ${DOCKERHUB_USERNAME}/todo-nginx:latest
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

  frontend:
    image: ${DOCKERHUB_USERNAME}/todo-frontend:latest
    expose:
      - "80"

  backend:
    image: ${DOCKERHUB_USERNAME}/todo-backend:latest
    expose:
      - "5000"
    environment:
      - PORT=5000
